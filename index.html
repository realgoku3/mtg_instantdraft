<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTG Instant Draft Machine</title>
  <!-- terminal-style monospace only -->
  <style>
    :root {
      --bg: #000000;
      --bg2: #001100;
      --bg3: #001a00;
      --border: #003300;
      --text: #00ff41;
      --text2: #00aa00;
      --text3: #005500;
      --accent: #00ff41;
      --accent-dim: rgba(0,255,65,0.1);
      --accent-glow: rgba(0,255,65,0.3);
      --c-col: #005500;
      --u-col: #00aa00;
      --r-col: #00ff41;
      --m-col: #66ff99;
      --radius: 2px;
      --card-radius: 4.75%/3.5%;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    ::selection { background: #00ff41; color: #000; }

    /* ── HEADER ── */
    .app-header {
      text-align: center;
      padding: 48px 24px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }
    .app-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% -20%, rgba(0,255,65,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .app-title {
      font-family: inherit;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 700;
      color: var(--accent);
      text-shadow: none;
      letter-spacing: 0.04em;
      position: relative;
    }
    .app-subtitle {
      color: var(--text2);
      margin-top: 8px;
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* ── LAYOUT ── */
    #main-content { max-width: 1300px; margin: 0 auto; padding: 32px 20px 64px; }

    /* ── SETUP SCREEN ── */
    #setup-screen { max-width: 560px; margin: 0 auto; }

    .mode-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }
    .mode-btn {
      flex: 1 1 auto;
      min-width: 100px;
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .mode-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .setup-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
    }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.83rem; color: var(--text2); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.03em; text-transform: uppercase; }
    .form-row { display: flex; gap: 16px; }
    .form-row .form-group { flex: 1; }

    input[type=text], input[type=number], select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input[type=text]:focus, input[type=number]:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }
    textarea { resize: vertical; min-height: 100px; font-size: 0.85rem; }
    select option { background: var(--bg3); }
    input[type=number] { appearance: textfield; -moz-appearance: textfield; }
    input[type=number]::-webkit-inner-spin-button { display: none; }

    .hint { font-size: 0.78rem; color: var(--text3); margin-top: 5px; }
    .hint a { color: var(--accent); text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    /* Toggle */
    .form-group label.toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      padding: 6px 0;
      margin-bottom: 0;
    }
    .toggle-row input[type=checkbox] { display: none; }
    .toggle-track {
      display: inline-block;
      width: 40px; height: 22px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 99px;
      position: relative;
      transition: background 0.18s, border-color 0.18s;
      flex-shrink: 0;
      margin-right: 2px;
    }
    .toggle-track::after {
      content: '';
      position: absolute;
      left: 2px; top: 2px;
      width: 16px; height: 16px;
      background: var(--text3);
      border-radius: 50%;
      transition: transform 0.18s, background 0.18s;
    }
    .toggle-row input:checked ~ .toggle-track { background: var(--accent-dim); border-color: var(--accent); }
    .toggle-row input:checked ~ .toggle-track::after { transform: translateX(18px); background: var(--accent); }
    .toggle-label {
      font-size: 0.9rem;
      color: var(--text2);
      display: inline-block;
      padding-left: 2px;
    }

    .divider { height: 1px; background: var(--border); margin: 20px 0; }

    .btn-primary {
      width: 100%;
      padding: 13px 24px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.1s;
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .btn-primary:hover { box-shadow: 0 0 30px rgba(0,255,65,0.5); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      padding: 9px 18px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-family: inherit;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .btn-icon { margin-right: 6px; }

    /* Block list */
    .block-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px;
      background: var(--bg3);
    }
    .block-item {
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text2);
      transition: all 0.15s;
      border: 1px solid transparent;
    }
    .block-item:hover { background: var(--bg2); color: var(--text); border-color: var(--border); }
    .block-item.selected { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

    /* ── PROGRESS ── */
    #progress-section {
      max-width: 560px;
      margin: 32px auto;
      text-align: center;
    }
    .progress-track {
      height: 6px;
      background: var(--bg3);
      border-radius: 99px;
      overflow: hidden;
      margin: 16px 0 12px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.3s ease;
      width: 0%;
    }
    #progress-text { color: var(--text2); font-size: 0.9rem; min-height: 1.4em; }
    .progress-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTS ── */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 28px;
    }
    .results-title {
      font-family: inherit;
      font-size: 1.5rem;
      color: var(--accent);
    }
    .results-actions { display: flex; gap: 8px; }

    /* Pack block */
    .pack-block { margin-bottom: 40px; }
    .pack-header {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .pack-title {
      font-family: inherit;
      font-size: 1.05rem;
      color: var(--accent);
      font-weight: 600;
    }
    .pack-meta { font-size: 0.8rem; color: var(--text3); }
    .pack-badge {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 99px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text3);
    }

    /* Card grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 12px;
    }
    .pack-block .card-grid {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }
    .pack-block.expanded .card-grid {
      max-height: 5000px;
      opacity: 1;
    }

    /* Card component */
    .card-item {
      position: relative;
      border-radius: 4.75%/3.5%;
      overflow: hidden;
      box-shadow: 0 0 8px rgba(0,255,65,0.15);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      background: var(--bg3);
      aspect-ratio: 488/680;
    }
    .card-item:hover { transform: translateY(-5px) scale(1.025); box-shadow: 0 0 16px rgba(0,255,65,0.3); z-index: 2; }
    .card-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: inherit;
    }
    .card-item .card-back { display: none; }
    .card-item.flipped .card-front { display: none; }
    .card-item.flipped .card-back { display: block; }

    .rarity-gem {
      position: absolute;
      top: 6px; right: 6px;
      width: 18px; height: 18px;
      border-radius: 50%;
      font-size: 0.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      pointer-events: none;
      opacity: 0.9;
    }
    .rarity-gem.C { background: var(--c-col); color: var(--text); }
    .rarity-gem.U { background: var(--u-col); }
    .rarity-gem.R { background: var(--r-col); }
    .rarity-gem.M { background: var(--m-col); }

    .flip-btn {
      position: absolute;
      bottom: 7px; right: 7px;
      width: 26px; height: 26px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      color: white;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      z-index: 3;
    }
    .flip-btn:hover { background: rgba(0,255,65,0.8); color: #000; }

    /* Card skeleton */
    .card-skeleton {
      background: var(--bg3);
      border-radius: 4.75%/3.5%;
      aspect-ratio: 488/680;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Tokens section */
    #tokens-section { margin-top: 48px; }
    .section-title {
      font-family: inherit;
      font-size: 1.2rem;
      color: var(--accent);
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    /* Error/info banners */
    .banner {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      margin-bottom: 16px;
      border: 1px solid;
    }
    .banner.error { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.4); color: #fca5a5; }
    .banner.warn { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.4); color: #fcd34d; }
    .banner.info { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.4); color: #a5b4fc; }

    /* ── PRINTER UI ── */
    .printer-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 0.85rem;
    }
    .printer-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    .printer-dot.connected { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .printer-dot.printing  { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: pulse 0.8s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .printer-label { color: var(--text2); flex: 1; min-width: 120px; }
    .printer-status-text { color: var(--text3); font-size: 0.8rem; flex: 2; font-style: italic; }
    .btn-printer-connect {
      padding: 7px 14px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text2);
      font-family: inherit;
      font-size: 0.83rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .btn-printer-connect:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .btn-printer-connect.connected { border-color: #22c55e55; color: #86efac; }
    .pack-print-btn {
      padding: 5px 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text3);
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .pack-print-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .pack-print-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .pack-print-btn.printing { border-color: var(--accent); color: var(--accent); animation: pulse 0.8s infinite; }

    /* ── RETRO / ASCII MODE (card image filter only) ── */
    body.retro .card-item img { filter: grayscale(1) contrast(1.3); }

    /* ── COLLAPSIBLE PACKS ── */
    .pack-header { cursor: pointer; user-select: none; }
    .pack-chevron { display: inline-block; margin-right: 6px; font-size: 0.8rem; color: var(--text3); transition: transform 0.25s ease; }
    .pack-block.expanded .pack-chevron { transform: rotate(90deg); }

    /* ── THERMAL PREVIEW TOGGLE ── */
    .thermal-toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .thermal-toggle-wrap .toggle-label { font-size: 0.83rem; white-space: nowrap; }

    /* ── GANG PRINTING ── */
    .gang-print-row { display: flex; align-items: center; gap: 6px; padding: 0 4px; }
    .gang-print-row input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; }
    .gang-print-row label { font-size: 0.82rem; color: var(--text2); cursor: pointer; white-space: nowrap; }

    /* ── CANCEL PRINT ── */
    .btn-cancel-print {
      padding: 8px 16px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.5);
      border-radius: var(--radius);
      color: #fca5a5;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      animation: pulse 0.8s ease-in-out infinite;
    }
    .btn-cancel-print:hover { background: rgba(239,68,68,0.3); border-color: #ef4444; color: #fff; }

    /* ── QUICK PRINT ── */
    .quick-print-row { display: flex; align-items: center; gap: 6px; min-width: 180px; }
    .quick-print-row input[type=text] { flex: 1; padding: 6px 10px; font-size: 0.82rem; min-width: 100px; }
    .quick-print-row button { white-space: nowrap; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border); }

    /* ── CARD LIGHTBOX ── */
    .card-lightbox {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.88);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      touch-action: pan-y;
      -webkit-tap-highlight-color: transparent;
    }
    .card-lightbox.visible { opacity: 1; }
    .card-lightbox-inner {
      position: relative;
      max-height: 50vh;
      max-width: 90vw;
      aspect-ratio: 488/680;
      user-select: none;
      -webkit-user-select: none;
    }
    .card-lightbox-inner img {
      width: 100%;
      height: 100%;
      max-height: 50vh;
      object-fit: contain;
      border-radius: 4.75%/3.5%;
      box-shadow: 0 0 40px rgba(0,255,65,0.25);
      display: block;
    }
    .card-lightbox-inner .card-back { display: none; }
    .card-lightbox-inner.flipped .card-front { display: none; }
    .card-lightbox-inner.flipped .card-back { display: block; }
    .card-lightbox-nav {
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.6rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
      margin: 0 12px;
    }
    .card-lightbox-nav:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .card-lightbox-close {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      z-index: 10000;
    }
    .card-lightbox-close:hover { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .card-lightbox-caption {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: var(--text2);
      font-size: 0.85rem;
      font-family: inherit;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }
    .card-lightbox-flip {
      position: absolute;
      bottom: 10px;
      right: 10px;
      width: 32px;
      height: 32px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      color: white;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 3;
    }
    .card-lightbox-flip:hover { background: rgba(0,255,65,0.8); color: #000; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .app-header { padding: 32px 16px 24px; }
      #main-content { padding: 20px 14px 48px; }
      .mode-btn { font-size: 0.8rem; padding: 8px 10px; }
      .card-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
      .card-lightbox-inner { max-height: none; max-width: 100vw; width: 100vw; padding: 8px; }
      .card-lightbox-inner img { max-height: none; width: 100%; height: auto; border-radius: 3%; }
      .card-lightbox-nav { display: none; }
    }
  </style>
</head>
<body>

<div id="app">
  <header class="app-header">
    <h1 class="app-title">MTG Instant Draft Machine</h1>
    <p class="app-subtitle">Generate authentic booster packs from any Magic: The Gathering set</p>
  </header>

  <main id="main-content">
    <!-- SETUP -->
    <section id="setup-screen">
      <div class="mode-selector" id="mode-selector">
        <button class="mode-btn active" data-mode="set">Set Draft</button>
        <button class="mode-btn" data-mode="chaos">Chaos</button>
        <button class="mode-btn" data-mode="block">Block</button>
        <button class="mode-btn" data-mode="cube">Cube</button>
      </div>

      <div class="setup-card">
        <div id="mode-inputs"></div>

        <div class="form-row">
          <div class="form-group" id="packs-group">
            <label for="num-packs">Number of Packs</label>
            <input type="number" id="num-packs" min="1" max="150" value="1">
          </div>
          <div class="form-group" id="drafters-group" style="display:none">
            <label for="num-drafters">Drafters (×3 packs)</label>
            <input type="number" id="num-drafters" min="2" max="16" value="8">
          </div>
        </div>

        <div class="form-group">

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════
const RATE_LIMIT_DELAY = 105; // slightly over 100ms for safety

const BONUS_SHEETS = {
  stx: ['sta'],

const HISTORICAL_BLOCKS = {

// ═══════════════════════════════════════════════════════════════
// RATE LIMITER  (mirrors Python's thread-safe 100ms stagger)
// JS is single-threaded: slot reservation is atomic at sync level.
// Concurrent async calls get distinct time slots via nextCallTime.
// ═══════════════════════════════════════════════════════════════
let _nextCallTime = Date.now();

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function rateLimitedGet(url) {
  // Reserve a unique call slot (sync, no race condition in JS)
  const mySlot = _nextCallTime;
  _nextCallTime = Math.max(_nextCallTime + RATE_LIMIT_DELAY, Date.now() + RATE_LIMIT_DELAY);

  const wait = mySlot - Date.now();
  if (wait > 0) await sleep(wait);

  const delays = [1000, 2000, 4000, 8000, 16000];
  for (let attempt = 0; attempt <= delays.length; attempt++) {
    try {
      const res = await fetch(url, {
        headers: { 'Accept': 'application/json' },
      });
      if (res.status === 200 || res.status === 404) return res;
      if ([429, 500, 502, 503, 504].includes(res.status) && attempt < delays.length) {
        setStatus(`Rate limited -- retrying in ${delays[attempt]/1000}s...`);
        await sleep(delays[attempt]);
        continue;
      }
      return res;
    } catch {
      if (attempt < delays.length) { await sleep(delays[attempt]); continue; }
    }
  }
  return null;
}

// ═══════════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════════
async function getSetInfo(setCode) {
  const res = await rateLimitedGet(`https://api.scryfall.com/sets/${setCode}`);
  if (res && res.status === 200) return res.json();
  return null;
}

async function fetchCardsForQuery(query) {
  const cards = [];
  let url = `https://api.scryfall.com/cards/search?q=${encodeURIComponent(query)}`;
  while (url) {
    const res = await rateLimitedGet(url);
    if (res && res.status === 200) {
      const data = await res.json();
      cards.push(...(data.data || []));
      url = data.has_more ? data.next_page : null;
    } else {
      break;
    }
  }
  return cards;
}

async function fetchTokenData(uri) {
  const res = await rateLimitedGet(uri);
  if (res && res.status === 200) return res.json();
  return null;
}

const _cardByNameCache = {};
async function fetchCardByName(name) {
  if (_cardByNameCache[name]) return _cardByNameCache[name];
  const res = await rateLimitedGet(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`);
  if (res && res.status === 200) {
    const data = await res.json();
    _cardByNameCache[name] = data;
    return data;
  }
  return null;
}

async function getCubeList(cubeId) {
  setStatus(`Fetching cube list from CubeCobra (${cubeId})...`);
  const res = await rateLimitedGet(`https://cubecobra.com/cube/api/cubelist/${cubeId}`);
  if (res && res.status === 200) {
    const text = await res.text();
    return text.split('\n').map(l => l.trim()).filter(Boolean);
  }
  return null;
}

async function getAllChaosSets() {
  setStatus('Fetching valid sets for Chaos Draft...');
  const res = await rateLimitedGet('https://api.scryfall.com/sets');
  if (res && res.status === 200) {
    const data = await res.json();
    const validTypes = new Set(['core', 'expansion', 'masters', 'draft_innovation']);
    return data.data.filter(s => validTypes.has(s.set_type)).map(s => s.code);
  }
  return [];
}

// ═══════════════════════════════════════════════════════════════
// POOL BUILDING
// ═══════════════════════════════════════════════════════════════
async function buildPools(setCode) {
  const info = await getSetInfo(setCode);
  if (!info) return null;

  const releaseDate = info.released_at || '1990-01-01';
  const isPlayBooster = releaseDate >= '2024-02-09'; // MKM onwards
  const setName = info.name || setCode.toUpperCase();

  setStatus(`Fetching card pool for ${setName}...`);
  const mainCards = await fetchCardsForQuery(`e:${setCode} is:booster -is:digital`);
  if (!mainCards.length) {
    setStatus(`No draftable cards found for ${setName}.`);
    return null;
  }

  const pools = {
    C: [], U: [], R: [], M: [], Basic: [], Bonus: [],
    DFC: [], Legendary: [], Planeswalker: [], Battle: [],
    DraftMatters: [], Gate: [], SnowLand: [], NonBasicLand: [], Lesson: [],
  };

  for (const c of mainCards) {
    const rarity = c.rarity || 'common';
    const tl = (c.type_line || '').toLowerCase();

    const isDFC = c.card_faces && c.card_faces[0]?.image_uris;
    const isLegendary = tl.includes('legendary') && tl.includes('creature');
    const isPlaneswalker = tl.includes('planeswalker');
    const isBattle = tl.includes('battle');
    const isGate = tl.includes('gate');
    const isSnow = tl.includes('snow') && tl.includes('land');
    const isNonbasicLand = tl.includes('land') && !tl.includes('basic');
    const isDraftMatters = tl.includes('conspiracy') || c.watermark === 'conspiracy';
    const isLesson = tl.includes('lesson');

    if (tl.includes('basic land')) pools.Basic.push(c);
    else if (rarity === 'common') pools.C.push(c);
    else if (rarity === 'uncommon') pools.U.push(c);
    else if (rarity === 'mythic') pools.M.push(c);
    else pools.R.push(c);

    if (isDFC) pools.DFC.push(c);
    if (isLegendary) pools.Legendary.push(c);
    if (isPlaneswalker) pools.Planeswalker.push(c);
    if (isBattle) pools.Battle.push(c);
    if (isDraftMatters) pools.DraftMatters.push(c);
    if (isGate) pools.Gate.push(c);
    if (isSnow) pools.SnowLand.push(c);
    if (isNonbasicLand) pools.NonBasicLand.push(c);
    if (isLesson) pools.Lesson.push(c);
  }

  if (BONUS_SHEETS[setCode]) {
    for (const bCode of BONUS_SHEETS[setCode]) {
      setStatus(`Fetching bonus sheet: ${bCode.toUpperCase()}...`);
      const bonus = await fetchCardsForQuery(`e:${bCode} lang:en -is:digital`);
      pools.Bonus.push(...bonus);
    }
  }
  if (setCode === 'mh2') {
    setStatus('Fetching New-to-Modern reprints for MH2...');
    pools.Bonus = await fetchCardsForQuery('e:mh2 is:reprint lang:en -is:digital');
  }

  return { pools, isPlayBooster, setName, releaseDate };
}

// ═══════════════════════════════════════════════════════════════
// PACK ROLLING  (ported 1:1 from Python)
// ═══════════════════════════════════════════════════════════════
function rollPack(pools, isPlayBooster, setCode, releaseDate) {
  const pack = [];
  const seenNames = new Set();

  function pull(poolKeys, allowDupe = false) {
    const keys = Array.isArray(poolKeys) ? [...poolKeys] : [poolKeys];
    keys.push('C', 'U', 'R', 'M', 'Basic');

    for (const key of keys) {
      const pool = pools[key];
      if (!pool || !pool.length) continue;
      const valid = allowDupe ? pool : pool.filter(c => !seenNames.has(c.name));
      if (valid.length) {
        const chosen = valid[Math.floor(Math.random() * valid.length)];
        seenNames.add(chosen.name);
        return chosen;
      }
      if (pool.length) {
        const chosen = pool[Math.floor(Math.random() * pool.length)];
        seenNames.add(chosen.name);
        return chosen;
      }
    }
    return null;
  }

  const rand = () => Math.random();

  // Vintage 8-card packs
  if (['arn','atq','drk','fem','hml'].includes(setCode)) {
    for (let i = 0; i < 2; i++) pack.push(pull(['U','R']));
    for (let i = 0; i < 6; i++) pack.push(pull('C'));
    return pack.filter(Boolean);
  }

  // Vintage 12-card packs
  if (['chr','all'].includes(setCode)) {
    pack.push(pull(['R','M','U']));
    for (let i = 0; i < 3; i++) pack.push(pull('U'));
    for (let i = 0; i < 8; i++) pack.push(pull('C'));
    return pack.filter(Boolean);
  }

  // Double Masters (15 cards)
  if (['2xm','2x2'].includes(setCode)) {
    for (let i = 0; i < 2; i++) pack.push(rand() < 0.125 ? pull(['M','R']) : pull('R'));
    for (let i = 0; i < 3; i++) pack.push(pull('U'));
    for (let i = 0; i < 8; i++) pack.push(pull('C'));
    for (let i = 0; i < 2; i++) {
      const r = rand();
      if (r < 0.05) pack.push(pull(['R','M'], true));
      else if (r < 0.25) pack.push(pull('U', true));
      else pack.push(pull('C', true));
    }
    return pack.filter(Boolean);
  }

  // Commander Legends (20 cards)
  if (['cmr','clb'].includes(setCode)) {
    pack.push(rand() < 0.125 ? pull(['M','R']) : pull('R'));
    for (let i = 0; i < 2; i++) pack.push(pull(['Legendary','U']));
    for (let i = 0; i < 3; i++) pack.push(pull('U'));
    for (let i = 0; i < 13; i++) pack.push(pull('C'));
    const r = rand();
    if (r < 0.05) pack.push(pull(['R','M'], true));
    else if (r < 0.25) pack.push(pull('U', true));
    else pack.push(pull('C', true));
    return pack.filter(Boolean);
  }

  // ── MODERN PLAY BOOSTERS (MKM 2024+) ──
  if (isPlayBooster) {
    pack.push(pull(['Basic','C']));                                          // Land slot
    pack.push(rand() < 0.125 ? pull(['M','R']) : pull('R'));                 // Rare/Mythic
    for (let i = 0; i < 3; i++) pack.push(pull('U'));                        // 3 Uncommons

    if (pools.Bonus.length && (setCode === 'otj' || rand() < 0.20))
      pack.push(pull('Bonus'));
    else
      pack.push(pull('C'));

    for (let i = 0; i < 6; i++) pack.push(pull('C'));                        // 6 Commons

    for (let i = 0; i < 2; i++) {
      const r = rand();
      if (r < 0.01) pack.push(pull(['M','R'], true));
      else if (r < 0.05) pack.push(pull('R', true));
      else if (r < 0.25) pack.push(pull('U', true));
      else pack.push(pull('C', true));
    }
    return pack.filter(Boolean);
  }

  // ── STANDARD DRAFT BOOSTERS ──
  let cCount = 10, uCount = 3;

  // Land slot
  if (pools.Basic.length && !['dgm','frf','khm'].includes(setCode)) {
    pack.push(pull('Basic'));
  } else if (setCode === 'dgm') {
    pack.push(pull(['Gate','Basic']));
  } else if (setCode === 'frf') {
    pack.push(pull(['NonBasicLand','Basic']));
  } else if (setCode === 'khm') {
    pack.push(pull(['SnowLand','Basic']));
  } else {
    cCount = 11; // pre-Shards era: extra common instead
  }

  // Set-specific sub-slots
  if (setCode === 'war')  { uCount--; pack.push(pull(['Planeswalker','U'])); }
  if (setCode === 'dom')  { uCount--; pack.push(pull(['Legendary','U'])); }
  if (setCode === 'mom')  { uCount--; pack.push(pull(['Battle','U'])); }
  if (['isd','dka','soi','emn','mid','vow','znr'].includes(setCode)) { cCount--; pack.push(pull(['DFC','C'])); }
  if (['cns','cn2'].includes(setCode)) { cCount--; pack.push(pull(['DraftMatters','C'])); }
  if (setCode === 'stx')  { cCount--; pack.push(pull(['Lesson','C'])); }
  if (BONUS_SHEETS[setCode] || setCode === 'mh2') { cCount--; pack.push(pull(['Bonus','C'])); }

  // Rare/Mythic slot
  pack.push(rand() < 0.125 ? pull(['M','R']) : pull('R'));

  // Uncommons
  for (let i = 0; i < uCount; i++) pack.push(pull('U'));

  // Commons (with foil slot logic)
  const mastersSets = new Set(['mma','mm2','mm3','ema','ima','a25','uma','mh1','cmm']);
  for (let i = 0; i < cCount; i++) {
    if (i === cCount - 1 && (mastersSets.has(setCode) || rand() < 0.15)) {
      const r = rand();
      if (r < 0.05) pack.push(pull(['R','M'], true));
      else if (r < 0.25) pack.push(pull('U', true));
      else pack.push(pull('C', true));
    } else {
      pack.push(pull('C'));
    }
  }

  return pack.filter(Boolean);
}

// ═══════════════════════════════════════════════════════════════
// CARD PARSING  (mirrors Python parse_scryfall_card)
// ═══════════════════════════════════════════════════════════════
function formatMana(text) {
  if (!text) return '';
  return text.replace(/\{/g, '[').replace(/\}/g, ']');
}

function parseScryfallCard(card) {
  const rarity = (card.rarity || 'common')[0].toUpperCase();
  const faces = [];

  if (card.card_faces) {
    if (card.card_faces[0]?.image_uris) {
      // True DFC
      card.card_faces.forEach((face, i) => {
        faces.push({
          name: face.name || '',
          manaCost: formatMana(face.mana_cost || ''),
          typeLine: face.type_line || '',
          text: face.oracle_text || face.flavor_text || '',
          power: face.power,
          toughness: face.toughness,
          loyalty: face.loyalty || card.loyalty,
          imageUri: face.image_uris?.normal,
          artCropUri: face.image_uris?.art_crop,
          rarity,
          isDFC: true,
          dfcSide: i === 0 ? 'front' : 'back',
          scryfallId: card.id,
          allParts: card.all_parts,
        });
      });
    } else {
      // Adventure / Split / Flip -- single image, combined text
      const main = card.card_faces[0];
      let combinedText = main.oracle_text || main.flavor_text || '';
      for (const face of card.card_faces.slice(1)) {
        const sName = face.name || '';
        const sMana = formatMana(face.mana_cost || '');
        const sType = face.type_line || '';
        const sText = face.oracle_text || face.flavor_text || '';
        combinedText += `\n\n-- ${sName}  ${sMana} --`;
        if (sType) combinedText += `\n${sType}`;
        combinedText += `\n${sText}`;
      }
      faces.push({
        name: main.name || '',
        manaCost: formatMana(main.mana_cost || ''),
        typeLine: main.type_line || '',
        text: combinedText.trim(),
        power: main.power || card.power,
        toughness: main.toughness || card.toughness,
        loyalty: main.loyalty || card.loyalty,
        imageUri: card.image_uris?.normal,
        artCropUri: card.image_uris?.art_crop,
        rarity,
        isDFC: false,
        scryfallId: card.id,
        allParts: card.all_parts,
      });
    }
  } else {
    // Standard single-face
    faces.push({
      name: card.name || '',
      manaCost: formatMana(card.mana_cost || ''),
      typeLine: card.type_line || '',
      text: card.oracle_text || card.flavor_text || '',
      power: card.power,
      toughness: card.toughness,
      loyalty: card.loyalty,
      imageUri: card.image_uris?.normal,
      artCropUri: card.image_uris?.art_crop,
      rarity,
      isDFC: false,
      scryfallId: card.id,
      allParts: card.all_parts,
    });
  }
  return faces;
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════
function setProgress(pct) {
  document.getElementById('progress-fill').style.width = `${pct}%`;
}

function setStatus(msg) {
  const el = document.getElementById('progress-text');
  if (el) el.textContent = msg;
}

function showScreen(name) {
  document.getElementById('setup-screen').style.display = name === 'setup' ? '' : 'none';
  document.getElementById('progress-section').style.display = name === 'progress' ? '' : 'none';
  document.getElementById('results-section').style.display = name === 'results' ? '' : 'none';
  // Show printer bar only on results screen; hide on others
  const printerBar = document.getElementById('printer-bar');
  if (printerBar) printerBar.style.display = name === 'results' ? '' : 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function rarityColor(r) {
  return { C: 'C', U: 'U', R: 'R', M: 'M' }[r] || 'C';
}

function buildCardElement(face, isBack = false) {
  const item = document.createElement('div');
  item.className = 'card-item';
  item._faces = [face];
  item.title = `${face.name}${face.manaCost ? '  ' + face.manaCost : ''}`;

  if (face.isDFC && !isBack) {
    // DFC: show front + back, with flip button
    const frontImg = document.createElement('img');
    frontImg.className = 'card-front';
    frontImg.src = face.imageUri || '';
    frontImg.alt = face.name;
    frontImg.loading = 'lazy';
    frontImg.onerror = () => { frontImg.style.display = 'none'; };
    item.appendChild(frontImg);

    // We need the back face info -- it comes in the next face object
    // The caller handles both faces for DFC, we store the back URI in dataset
    item.dataset.frontUri = face.imageUri || '';
  } else {
    const img = document.createElement('img');
    img.className = 'card-front';
    img.src = face.imageUri || '';
    img.alt = face.name;
    img.loading = 'lazy';
    img.onerror = () => { img.style.display = 'none'; };
    item.appendChild(img);
  }

  const gem = document.createElement('div');
  gem.className = `rarity-gem ${rarityColor(face.rarity)}`;
  gem.textContent = face.rarity;
  item.appendChild(gem);

  return item;
}

function buildDFCElement(frontFace, backFace) {
  const item = document.createElement('div');
  item.className = 'card-item';
  item._faces = [frontFace, backFace];
  item.title = `${frontFace.name} // ${backFace.name}`;

  const frontImg = document.createElement('img');
  frontImg.className = 'card-front';
  frontImg.src = frontFace.imageUri || '';
  frontImg.alt = frontFace.name;
  frontImg.loading = 'lazy';
  frontImg.onerror = () => { frontImg.style.display = 'none'; };
  item.appendChild(frontImg);

  const backImg = document.createElement('img');
  backImg.className = 'card-back';
  backImg.src = backFace.imageUri || '';
  backImg.alt = backFace.name;
  backImg.loading = 'lazy';
  backImg.onerror = () => { backImg.style.display = 'none'; };
  item.appendChild(backImg);

  const gem = document.createElement('div');
  gem.className = `rarity-gem ${rarityColor(frontFace.rarity)}`;
  gem.textContent = frontFace.rarity;
  item.appendChild(gem);

  const flipBtn = document.createElement('button');
  flipBtn.className = 'flip-btn';
  flipBtn.textContent = '↔';
  flipBtn.title = 'Flip card';
  flipBtn.addEventListener('click', e => {
    e.stopPropagation();
    item.classList.toggle('flipped');
  });
  item.appendChild(flipBtn);

  return item;
}

function renderPackBlock(header, cards) {
  const block = document.createElement('div');
  block.className = 'pack-block';

  state.allPackFaces.push(cards);
  state.allPackHeaders.push(header);

  const ph = document.createElement('div');
  ph.className = 'pack-header';
  ph.innerHTML = `
    <span class="pack-chevron">►</span>
    <span class="pack-title">${escHtml(header.title)}</span>
    <span class="pack-meta">${escHtml(header.setName)}</span>
    <span class="pack-badge">${escHtml(header.type)}</span>
    <span class="pack-badge">${cards.length} cards</span>
  `;

  ph.addEventListener('click', (e) => {
    if (e.target.closest('.pack-print-btn')) return;
    block.classList.toggle('expanded');
    const chevron = ph.querySelector('.pack-chevron');
    if (chevron) chevron.textContent = block.classList.contains('expanded') ? '▼' : '►';
  });

  const printBtn = document.createElement('button');
  printBtn.className = 'pack-print-btn';
  printBtn.textContent = 'Print Pack';
  printBtn.disabled = !printerState.connected;
  printBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    printPack(cards, header, printBtn);
  });
  ph.appendChild(printBtn);

  block.appendChild(ph);

  const grid = document.createElement('div');
  grid.className = 'card-grid';

  const packIdx = state.allPackFaces.length - 1;
  let i = 0;
  let cardGroupIdx = 0;
  while (i < cards.length) {
    const face = cards[i];
    let el;
    if (face.isDFC && face.dfcSide === 'front' && cards[i + 1]?.dfcSide === 'back') {
      el = buildDFCElement(face, cards[i + 1]);
      i += 2;
    } else {
      el = buildCardElement(face);
      i++;
    }
    const capturedIdx = cardGroupIdx;
    const capturedPack = packIdx;
    el.addEventListener('click', (e) => {
      if (e.target.closest('.flip-btn')) return;
      openLightbox(capturedPack, capturedIdx);
    });
    grid.appendChild(el);
    cardGroupIdx++;
  }

  block.appendChild(grid);
  return block;
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════════
// TOKEN DETECTION
// ═══════════════════════════════════════════════════════════════
async function collectTokens(packCardsList, tokenCache) {
  const newTokens = {};
  for (const card of packCardsList) {
    for (const part of (card.all_parts || [])) {
      if (part.component !== 'token') continue;
      if (part.id === card.id) continue;
      const uri = part.uri;
      if (!uri) continue;
      if (!tokenCache[uri]) {
        const data = await fetchTokenData(uri);
        if (data) tokenCache[uri] = data;
      }
      if (tokenCache[uri]) newTokens[uri] = tokenCache[uri];
    }
  }
  return newTokens;
}

// ═══════════════════════════════════════════════════════════════
// MAIN DRAFT GENERATOR
// ═══════════════════════════════════════════════════════════════
async function generateDraft() {
  // Read UI state
  state.numPacks = parseInt(document.getElementById('num-packs').value) || 1;
  state.numDrafters = parseInt(document.getElementById('num-drafters')?.value) || 8;
  state.includeTokens = document.getElementById('include-tokens').checked;

  const genBtn = document.getElementById('generate-btn');
  genBtn.disabled = true;

  showScreen('progress');
  setProgress(0);
  setStatus('Preparing draft...');

  const packsContainer = document.getElementById('packs-container');
  const tokensContainer = document.getElementById('tokens-container');
  packsContainer.innerHTML = '';
  tokensContainer.innerHTML = '';
  document.getElementById('tokens-section').style.display = 'none';
  document.getElementById('error-banner').innerHTML = '';
  state.allPackFaces = [];
  state.allPackHeaders = [];
  state.isPrintingCanceled = false;
  document.getElementById('cancel-print-btn').style.display = 'none';
  document.getElementById('print-all-btn').style.display = 'none';

  const poolCache = {};
  const tokenCache = {};
  const globalTokens = {};
  let draftSequence = [];
  let cubeList = [];
  let cubeIndex = 0;
  let validChaosSets = [];
  let titleStr = 'Draft Complete';

  try {
    // ── Build draft sequence ──
    if (state.mode === 'block') {
      const blockSets = HISTORICAL_BLOCKS[state.selectedBlock];
      if (!blockSets) {
        showError('Please select a block first.');
        showScreen('setup');
        genBtn.disabled = false;
        return;
      }
      draftSequence = [];
      for (let d = 0; d < state.numDrafters; d++) {
        draftSequence.push(...blockSets);
      }
      titleStr = `${titleCapital(state.selectedBlock)} Block Draft`;

    } else if (state.mode === 'cube') {
      // Check for pasted card list first
      const pasteEl = document.getElementById('cube-paste');
      const pastedText = pasteEl?.value.trim();
      let rawList = null;

      if (pastedText) {
        rawList = pastedText.split('\n').map(l => l.trim()).filter(Boolean);
      } else {
        let cId = (document.getElementById('cube-id-input')?.value || '').trim();
        const urlMatch = cId.match(/cube\/(?:list|overview|playtest)\/([^/?&]+)/i);
        if (urlMatch) cId = urlMatch[1];
        state.cubeId = cId;
        rawList = await getCubeList(cId);
      }

      if (!rawList || !rawList.length) {
        showError('Could not fetch cube list from CubeCobra. Check the cube ID and try again. You can also paste a card list directly into the text area below the cube ID field.');
        showScreen('setup');
        genBtn.disabled = false;
        return;
      }
      cubeList = shuffleArray([...rawList]);
      draftSequence = Array(state.numPacks).fill('cube');
      titleStr = `Cube Draft -- ${state.cubeId || 'Pasted List'}`;

    } else if (state.mode === 'chaos') {
      validChaosSets = await getAllChaosSets();
      if (!validChaosSets.length) {
        showError('Failed to fetch set list for Chaos Draft.');
        showScreen('setup');
        genBtn.disabled = false;
        return;
      }
      // Pick unique random sets
      const shuffled = shuffleArray([...validChaosSets]);
      draftSequence = shuffled.slice(0, state.numPacks);
      titleStr = 'Chaos Draft';

    } else {
      // Standard set
      let rawCode = document.getElementById('set-code-input')?.value.trim().toLowerCase() || '';
      if (!rawCode) { showScreen('setup'); genBtn.disabled = false; return; }

      // ASCII easter egg (only activate, never deactivate -- Konami code may have set it)
      if (rawCode.startsWith('ascii')) {
        state.retroMode = true;
        document.body.classList.add('retro');
        rawCode = rawCode.replace(/^ascii\s*/, '').trim();
      }

      state.setCode = rawCode || 'dft';
      draftSequence = Array(state.numPacks).fill(state.setCode);
      titleStr = `Set Draft`;
    }

    showScreen('results');
    document.getElementById('results-title').textContent = titleStr;

    const total = draftSequence.length;
    let done = 0;

    // ── Process each pack ──
    for (let packIdx = 0; packIdx < draftSequence.length; packIdx++) {
      const currentCode = draftSequence[packIdx];
      let packCards = [];
      let header = {};

      if (currentCode === 'cube') {
        header = { title: `Pack ${packIdx + 1}`, setName: `Cube: ${state.cubeId}`, type: 'Cube Pack' };
        setStatus(`Drawing cube pack ${packIdx + 1} of ${total}...`);

        while (packCards.length < 15) {
          if (cubeIndex >= cubeList.length) {
            cubeList = shuffleArray([...cubeList]);
            cubeIndex = 0;
            setStatus('Cube exhausted -- reshuffling...');
          }
          const cardName = cubeList[cubeIndex++];
          const data = await fetchCardByName(cardName);
          if (data) packCards.push(data);
        }

      } else {
        // Standard set / chaos / block
        if (!poolCache[currentCode]) {
          setStatus(`Building pool for ${currentCode.toUpperCase()}... (${packIdx + 1}/${total})`);
          const result = await buildPools(currentCode);
          if (!result) {
            // Chaos: try another set
            if (state.mode === 'chaos') {
              setStatus(`Skipping ${currentCode} -- pool build failed.`);
              const remaining = validChaosSets.filter(s => !draftSequence.includes(s));
              if (remaining.length) draftSequence[packIdx] = remaining[Math.floor(Math.random() * remaining.length)];
              packIdx--;
              continue;
            }
            showError(`Failed to build pool for set: ${currentCode}.`);
            break;
          }
          poolCache[currentCode] = result;
        }

        const { pools, isPlayBooster, setName, releaseDate } = poolCache[currentCode];
        const boosterType = isPlayBooster ? 'Play Booster' : 'Draft Booster';

        let packTitle, packMeta;
        if (state.mode === 'block') {
          const drafterNum = Math.floor(packIdx / HISTORICAL_BLOCKS[state.selectedBlock].length) + 1;
          const packNum = (packIdx % HISTORICAL_BLOCKS[state.selectedBlock].length) + 1;
          packTitle = `Drafter ${drafterNum} -- Pack ${packNum}`;
          packMeta = setName;
        } else {
          packTitle = `Pack ${packIdx + 1} of ${total}`;
          packMeta = setName;
        }

        header = { title: packTitle, setName: packMeta, type: boosterType };

        setStatus(`Rolling ${packMeta} pack ${packIdx + 1} of ${total}...`);
        packCards = rollPack(pools, isPlayBooster, currentCode, releaseDate);
      }

      // Parse all cards to faces
      const allFaces = [];
      for (const card of packCards) {
        allFaces.push(...parseScryfallCard(card));
      }

      // Render pack into results section
      const packBlock = renderPackBlock(header, allFaces);
      packsContainer.appendChild(packBlock);

      // Token collection
      if (state.includeTokens) {
        const newToks = await collectTokens(packCards, tokenCache);
        Object.assign(globalTokens, newToks);
      }

      done++;
      setProgress(Math.round((done / total) * 100));
    }

    // Render tokens
    if (state.includeTokens && Object.keys(globalTokens).length) {
      document.getElementById('tokens-section').style.display = '';
      for (const tokenData of Object.values(globalTokens)) {
        const faces = parseScryfallCard(tokenData);
        if (faces[0]) {
          tokensContainer.appendChild(buildCardElement(faces[0]));
        }
      }
    }

    setProgress(100);
    updatePrinterUI();

  } catch (err) {
    showError(`Draft generation error: ${err.message}`);
    console.error(err);
  }

  genBtn.disabled = false;
}

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function titleCapital(str) {
  return str.replace(/\b\w/g, c => c.toUpperCase());
}

// ═══════════════════════════════════════════════════════════════
// PRINT ALL PACKS
// ═══════════════════════════════════════════════════════════════
async function printAllPacks() {
  if (!printerState.connected || !state.allPackFaces.length) return;

  state.isPrintingCanceled = false;
  state.isPrinting = true;
  const cancelBtn = document.getElementById('cancel-print-btn');
  const printAllBtn = document.getElementById('print-all-btn');
  cancelBtn.style.display = '';
  printAllBtn.disabled = true;
  printAllBtn.textContent = 'Printing All...';

  try {
    for (let p = 0; p < state.allPackFaces.length; p++) {
      if (state.isPrintingCanceled) break;
      setPrintingIndicator(`Printing pack ${p + 1} of ${state.allPackFaces.length}...`);
      await printPack(state.allPackFaces[p], state.allPackHeaders[p], null);
    }

    if (!state.isPrintingCanceled) {
      setPrintingIndicator('All packs printed successfully!');
      setTimeout(() => setPrintingIndicator(''), 4000);
    }
  } catch (err) {
    if (!state.isPrintingCanceled) {
      setPrintingIndicator(`Print error: ${err.message}`);
      console.error(err);
    }
  } finally {
    state.isPrinting = false;
    cancelBtn.style.display = 'none';
    printAllBtn.disabled = false;
    printAllBtn.textContent = 'Print All Packs';
  }
}

function cancelPrint() {
  state.isPrintingCanceled = true;
  setPrintingIndicator('Print canceled by user.');
  document.getElementById('cancel-print-btn').style.display = 'none';
  setTimeout(() => {
    if (!state.isPrinting) setPrintingIndicator('');
  }, 3000);
}

// ═══════════════════════════════════════════════════════════════
// THERMAL PRINT PREVIEW
// ═══════════════════════════════════════════════════════════════
async function toggleThermalPreview(enabled) {
  state.thermalPreview = enabled;
  const allItems = document.querySelectorAll('#packs-container .card-item, #tokens-container .card-item');
  if (!allItems.length) return;

  setPrintingIndicator(enabled ? 'Rendering thermal previews...' : 'Restoring card images...');
  let processed = 0;

  for (const item of allItems) {
    const faces = item._faces;
    if (!faces) continue;

    const frontImg = item.querySelector('.card-front');
    const backImg = item.querySelector('.card-back');

    if (enabled) {
      if (frontImg && !item._originalFrontSrc) item._originalFrontSrc = frontImg.src;
      if (backImg && !item._originalBackSrc) item._originalBackSrc = backImg.src;

      if (frontImg && faces[0]) {
        try {
          const canvas = await renderCardToCanvas(faces[0]);
          frontImg.src = canvas.toDataURL('image/png');
        } catch { /* keep original */ }
      }
      if (backImg && faces[1]) {
        try {
          const canvas = await renderCardToCanvas(faces[1]);
          backImg.src = canvas.toDataURL('image/png');
        } catch { /* keep original */ }
      }
    } else {
      if (frontImg && item._originalFrontSrc) frontImg.src = item._originalFrontSrc;
      if (backImg && item._originalBackSrc) backImg.src = item._originalBackSrc;
    }

    processed++;
    if (processed % 20 === 0) {
      setPrintingIndicator(`${enabled ? 'Rendering' : 'Restoring'} ${processed}/${allItems.length}...`);
      await sleep(0); // yield to UI thread
    }
  }
  setPrintingIndicator('');
}

// ═══════════════════════════════════════════════════════════════
// QUICK PRINT (Single Card)
// ═══════════════════════════════════════════════════════════════
async function quickPrintFrom(inputId) {
  const input = document.getElementById(inputId);
  const name = (input?.value || '').trim();
  if (!name) return;
  if (!printerState.connected) {
    alert('Connect a printer first.');
    return;
  }

  const statusMsg = (msg) => {
    setPrintingIndicator(msg);
    const sStatus = document.getElementById('setup-printer-status');
    if (sStatus) sStatus.textContent = msg;
  };

  statusMsg(`Fetching "${name}" from Scryfall...`);
  const card = await fetchCardByName(name);
  if (!card) {
    statusMsg(`Card not found: "${name}"`);
    setTimeout(() => statusMsg(''), 3000);
    return;
  }

  const faces = parseScryfallCard(card);
  state.isPrintingCanceled = false;

  const groups = [];
  let i = 0;
  while (i < faces.length) {
    const face = faces[i];
    if (face.isDFC && face.dfcSide === 'front' && faces[i+1]?.dfcSide === 'back') {
      groups.push([face, faces[i+1]]);
      i += 2;
    } else {
      groups.push([face]);
      i++;
    }
  }

  for (const group of groups) {
    for (let fi = 0; fi < group.length; fi++) {
      await printCardFace(group[fi], fi === group.length - 1, true);
    }
  }

  statusMsg(`Printed: ${card.name}`);
  setTimeout(() => statusMsg(''), 3000);
  input.value = '';
}

async function quickPrint() { return quickPrintFrom('quick-print-input'); }

// ═══════════════════════════════════════════════════════════════
// LOCAL STORAGE PERSISTENCE
// ═══════════════════════════════════════════════════════════════
const LS_KEY = 'mtg_draft_settings';

function saveSettings() {
  const data = {
    mode: state.mode,
    numPacks: state.numPacks,
    numDrafters: state.numDrafters,
    includeTokens: state.includeTokens,
    gangPrinting: document.getElementById('gang-print-toggle')?.checked || false,
    setCode: document.getElementById('set-code-input')?.value || '',
    cubeId: document.getElementById('cube-id-input')?.value || '',
  };
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);

    if (data.mode) {
      state.mode = data.mode;
      document.querySelectorAll('.mode-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === data.mode);
      });
      renderModeInputs(data.mode);
    }
    if (data.numPacks) {
      state.numPacks = data.numPacks;
      const el = document.getElementById('num-packs');
      if (el) el.value = data.numPacks;
    }
    if (data.numDrafters) {
      state.numDrafters = data.numDrafters;
      const el = document.getElementById('num-drafters');
      if (el) el.value = data.numDrafters;
    }
    if (data.includeTokens != null) {
      state.includeTokens = data.includeTokens;
      const el = document.getElementById('include-tokens');
      if (el) el.checked = data.includeTokens;
    }
    if (data.gangPrinting != null) {
      const el = document.getElementById('gang-print-toggle');
      if (el) el.checked = data.gangPrinting;
    }
    // Set code / cube ID are restored when their mode panel renders
    if (data.setCode && data.mode === 'set') {
      setTimeout(() => {
        const el = document.getElementById('set-code-input');
        if (el) el.value = data.setCode;
      }, 50);
    }
    if (data.cubeId && data.mode === 'cube') {
      setTimeout(() => {
        const el = document.getElementById('cube-id-input');
        if (el) el.value = data.cubeId;
      }, 50);
    }
  } catch {}
}

// ═══════════════════════════════════════════════════════════════
// KONAMI CODE EASTER EGG (↑↑↓↓←→←→)
// ═══════════════════════════════════════════════════════════════
function setupKonamiCode() {
  const sequence = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight'];
  const buffer = [];

  document.addEventListener('keydown', (e) => {
    buffer.push(e.key);
    if (buffer.length > sequence.length) buffer.shift();

    if (buffer.length === sequence.length && buffer.every((k, i) => k === sequence[i])) {
      buffer.length = 0;
      state.retroMode = !state.retroMode;
      document.body.classList.toggle('retro', state.retroMode);

      if (state.thermalPreview) {
        toggleThermalPreview(true);
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// EVENT WIRING & INIT
// ═══════════════════════════════════════════════════════════════
function init() {
  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
      renderModeInputs(state.mode);
      saveSettings();
    });
  });
